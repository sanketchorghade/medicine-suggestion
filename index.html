<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Recommendation System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 5px;
        }

        .warning strong {
            color: #856404;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .example {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #results {
            margin-top: 30px;
        }

        .result-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .condition {
            background: #e7f3ff;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #0066cc;
            margin-bottom: 15px;
        }

        .medicines {
            margin: 15px 0;
        }

        .medicines h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .medicine-item {
            background: white;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #28a745;
        }

        .advice {
            background: #fff3cd;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .advice strong {
            color: #856404;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            display: none;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💊 Medicine Recommendation System</h1>
        <p class="subtitle">Get medicine suggestions based on your symptoms</p>

        <div class="warning">
            <strong>⚠️ Disclaimer:</strong> This is an educational tool only. Always consult a qualified healthcare professional for proper diagnosis and treatment.
        </div>

        <div class="input-group">
            <label for="symptoms">Enter Your Symptoms:</label>
            <input type="text" id="symptoms" placeholder="e.g., fever, headache, cough">
            <p class="example">💡 Tip: Separate multiple symptoms with commas</p>
        </div>

        <button onclick="getRecommendations()">Get Recommendations</button>

        <div class="loading" id="loading">
            <p>🔍 Analyzing symptoms...</p>
        </div>

        <div id="results"></div>
    </div>

    <script>
        async function getRecommendations() {
            const symptomsInput = document.getElementById('symptoms');
            const symptoms = symptomsInput.value.trim();
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');

            if (!symptoms) {
                resultsDiv.innerHTML = '<div class="error">Please enter at least one symptom.</div>';
                return;
            }

            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ symptoms: symptoms })
                });

                const data = await response.json();
                loadingDiv.style.display = 'none';

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">${data.error}</div>`;
                    return;
                }

                displayResults(data.results);
            } catch (error) {
                loadingDiv.style.display = 'none';
                resultsDiv.innerHTML = '<div class="error">An error occurred. Please try again.</div>';
            }
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            let html = '<h2 style="color: #667eea; margin-bottom: 20px;">📋 Recommendations:</h2>';

            results.forEach(result => {
                html += `
                    <div class="result-card">
                        <h3>Symptom: ${result.symptom}</h3>
                        <div class="condition">Condition: ${result.condition}</div>

                        <div class="medicines">
                            <h4>💊 Recommended Medicines:</h4>
                            ${result.medicines.map(med => `<div class="medicine-item">${med}</div>`).join('')}
                        </div>

                        <div class="advice">
                            <strong>📌 Advice:</strong> ${result.advice}
                        </div>
                    </div>
                `;
            });

            resultsDiv.innerHTML = html;
        }

        // Allow Enter key to submit
        document.getElementById('symptoms').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getRecommendations();
            }
        });
    </script>
</body>
</html>
